# ==========================================
# CONFIGURACIÓN DE PRODUCCIÓN (FINAL)
# ==========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="RehabIMU"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_REBOOT=y

# Sensores y Hardware
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_ADC=y
CONFIG_GPIO=y
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Ahorro de Energía (Logs desactivados)
CONFIG_LOG=n
CONFIG_PRINTK=n
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n